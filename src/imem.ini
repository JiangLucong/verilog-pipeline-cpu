@00 1100 // LOAD  gr1, [gr0+0]        ; gr1 = N
@01 4f80 // ADDI  gr7, 0x80           ; gr7 = 0x80 (freq table base)

// clear freq table
@02 4d80 // ADDI  gr5, 0x80           ; gr5 = 128 (clear counter)
@03 4470 // ADD   gr4, gr7, gr0       ; gr4 = 0x80 (clear pointer)
@04 1e40 // STORE gr6, [gr4+0]        ; dmem[gr4] = 0   (gr6 is 0 after reset)
@05 4c01 // ADDI  gr4, 0x01           ; gr4++
@06 a504 // LOOP  gr5, 0x04           ; gr5-- ; if(gr5!=0) jump @04

// scan text
@07 4a01 // ADDI  gr2, 0x01           ; gr2 = 1 (text pointer) 
@08 1320 // LOAD  gr3, [gr2+0]        ; gr3 = dmem[gr2] (ASCII, 0..127)
@09 4473 // ADD   gr4, gr7, gr3       ; gr4 = 0x80 + gr3 (bucket address)
@0a 1540 // LOAD  gr5, [gr4+0]        ; gr5 = dmem[gr4] (old count)
@0b 4d01 // ADDI  gr5, 0x01           ; gr5++
@0c 1d40 // STORE gr5, [gr4+0]        ; dmem[gr4] = gr5 (new count)
@0d 4a01 // ADDI  gr2, 0x01           ; gr2++ (next char)
@0e a108 // LOOP  gr1, 0x08           ; gr1-- ; if(gr1!=0) jump @08

@0f 0800 // HALT
